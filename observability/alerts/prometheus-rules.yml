groups:
  - name: amaryllis-slo
    rules:
      - alert: AmaryllisRequestAvailabilityLow
        expr: amaryllis_request_availability_ratio < 0.995
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Amaryllis request availability below SLO"
          description: "Availability has dropped below 99.5% for 5 minutes."

      - alert: AmaryllisRequestLatencyHigh
        expr: amaryllis_request_latency_p95_ms > 1200
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Amaryllis p95 latency above SLO"
          description: "Request latency p95 is above 1200ms for 10 minutes."

      - alert: AmaryllisRunSuccessLow
        expr: amaryllis_run_success_ratio < 0.98
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Amaryllis run success ratio below SLO"
          description: "Run success ratio is below 98% for 10 minutes."

      - alert: AmaryllisErrorBudgetBurnHigh
        expr: amaryllis_error_budget_burn_rate{scope="requests"} > 2
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Amaryllis request error budget burning too fast"
          description: "Request error budget burn rate is above 2x."

      - alert: AmaryllisReleaseQualityFailed
        expr: (amaryllis_release_quality_snapshot_loaded == 1) and (amaryllis_release_quality_status < 1)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Amaryllis release quality snapshot reports fail"
          description: "Latest release quality status is fail while snapshot export is enabled."

      - alert: AmaryllisDesktopStagingParityFailed
        expr: (amaryllis_release_desktop_staging_signal_present == 1) and (amaryllis_release_desktop_staging_status < 1)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Amaryllis desktop staging parity failed"
          description: "macOS desktop parity staging signal is failing in latest release quality snapshot."

      - alert: AmaryllisReleaseQoSGateFailed
        expr: (amaryllis_release_qos_signal_present == 1) and (amaryllis_release_qos_status < 1)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Amaryllis release QoS gate failed"
          description: "QoS governor gate signal is failing in latest release quality snapshot."

      - alert: AmaryllisAdoptionSnapshotFailed
        expr: (amaryllis_adoption_snapshot_loaded == 1) and (amaryllis_adoption_status < 1)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Amaryllis adoption snapshot reports fail"
          description: "Latest adoption KPI snapshot status is fail while adoption export is enabled."

      - alert: AmaryllisNightlyMissionFailed
        expr: (amaryllis_nightly_mission_snapshot_loaded == 1) and (amaryllis_nightly_mission_status < 1)
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Amaryllis nightly mission report failed"
          description: "Latest nightly mission success/recovery report status is fail."

      - alert: AmaryllisNightlyBurnRateGateFailed
        expr: (amaryllis_nightly_mission_snapshot_loaded == 1) and (amaryllis_nightly_burn_rate_gate_passed < 1)
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Amaryllis nightly burn-rate gate failed"
          description: "Nightly mission report indicates burn-rate gate failure."

      - alert: AmaryllisNightlyAdoptionTrendGateFailed
        expr: (amaryllis_nightly_mission_snapshot_loaded == 1) and (amaryllis_nightly_adoption_trend_gate_passed < 1)
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Amaryllis nightly adoption trend gate failed"
          description: "Nightly mission report indicates adoption KPI trend regression gate failure."
