name: Security Gate

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  security-suite:
    name: Security Test Suite + Policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Check toolchain manifest drift
        run: |
          python scripts/release/check_toolchain_drift.py

      - name: Check deterministic eval/replay fixture drift
        run: |
          python scripts/release/check_eval_replay_determinism.py

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Check dependency drift
        run: |
          python scripts/release/check_dependency_drift.py

      - name: Check runtime/SLO profile drift
        run: |
          python scripts/release/check_runtime_profile_drift.py

      - name: Check autonomy policy-pack contract
        run: |
          python scripts/release/check_autonomy_policy_pack.py

      - name: Check architectural import boundaries
        run: |
          python scripts/release/check_import_boundaries.py

      - name: Run mandatory security HTTP/authz suite
        run: |
          python -m unittest \
            tests.test_auth_manager \
            tests.test_config_security_defaults \
            tests.test_security_compliance_api \
            tests.test_security_manager \
            tests.test_security_http_authz \
            tests.test_autonomy_circuit_breaker_api \
            tests.test_tool_enforcement_modes \
            tests.test_tool_call_parsing_security \
            tests.test_tool_isolation_policy \
            tests.test_tool_plugin_signing \
            tests.test_tool_permission_manager \
            tests.test_injection_containment_gate \
            tests.test_model_artifact_admission \
            tests.test_model_artifact_admission_gate \
            tests.test_environment_passport_gate \
            -v

      - name: Run security policy check
        run: |
          python scripts/security/policy_check.py

      - name: Run compliance baseline gate
        run: |
          python scripts/security/compliance_check.py

      - name: Run evidence export smoke check
        run: |
          export AMARYLLIS_SUPPORT_DIR="$(mktemp -d)/support"
          export AMARYLLIS_AUTH_ENABLED=true
          export AMARYLLIS_SECURITY_PROFILE=production
          export AMARYLLIS_TOOL_APPROVAL_ENFORCEMENT=strict
          export AMARYLLIS_TOOL_SANDBOX_ENABLED=true
          export AMARYLLIS_PLUGIN_SIGNING_MODE=strict
          export AMARYLLIS_PLUGIN_RUNTIME_MODE=sandboxed
          export AMARYLLIS_ALLOW_INSECURE_SECURITY_MODES=false
          export AMARYLLIS_AUTH_TOKENS='token-admin:admin:admin|user'
          python scripts/security/export_audit_evidence.py --output-name ci-security-evidence.json --window-days 30 --event-limit 500
          test -s "${AMARYLLIS_SUPPORT_DIR}/evidence/ci-security-evidence.json"

  security-scans:
    name: SAST + Dependency Audit + SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Check toolchain manifest drift
        run: |
          python scripts/release/check_toolchain_drift.py

      - name: Install scanning dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit pip-audit cyclonedx-bom

      - name: Check dependency drift
        run: |
          python scripts/release/check_dependency_drift.py

      - name: Check runtime/SLO profile drift
        run: |
          python scripts/release/check_runtime_profile_drift.py

      - name: Check autonomy policy-pack contract
        run: |
          python scripts/release/check_autonomy_policy_pack.py

      - name: SAST (Bandit, high severity/high confidence)
        run: |
          bandit -r agents api automation controller memory models planner runtime storage tasks tools scripts \
            -x tests,macos \
            -lll -iii -q

      - name: Dependency vulnerability audit (blocking)
        run: |
          # Temporary exception for transitive pygments vulnerability.
          # No fixed upstream release is available as of 2026-03-25.
          # Remove this ignore immediately after patched pygments is published.
          pip-audit -r requirements.txt --strict --progress-spinner off --ignore-vuln CVE-2026-4539

      - name: Generate SBOM (CycloneDX)
        run: |
          mkdir -p artifacts
          cyclonedx-py requirements requirements.txt --of JSON -o artifacts/sbom.json
          test -s artifacts/sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-sbom
          path: artifacts/sbom.json
          if-no-files-found: error
