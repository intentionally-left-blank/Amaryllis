name: Agent Factory Baseline Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "20 3 * * 1"

permissions:
  contents: read

jobs:
  baseline-refresh:
    name: Agent Factory Baseline Refresh
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Run Agent Factory plan perf sample (release profile)
        run: |
          python scripts/release/agent_factory_plan_perf_gate.py \
            --baseline "eval/baselines/quality/agent_factory_plan_perf_envelope.json" \
            --baseline-profile "release" \
            --max-p95-latency-ms "100000" \
            --max-error-rate-pct "100" \
            --output "artifacts/agent-factory-plan-perf-gate-release-report.json"

      - name: Run Agent Factory plan perf sample (nightly profile)
        run: |
          python scripts/release/agent_factory_plan_perf_gate.py \
            --baseline "eval/baselines/quality/agent_factory_plan_perf_envelope.json" \
            --baseline-profile "nightly" \
            --max-p95-latency-ms "100000" \
            --max-error-rate-pct "100" \
            --output "artifacts/agent-factory-plan-perf-gate-nightly-report.json"

      - name: Run Agent Factory plan perf sample (dev_linux profile)
        run: |
          python scripts/release/agent_factory_plan_perf_gate.py \
            --baseline "eval/baselines/quality/agent_factory_plan_perf_envelope.json" \
            --baseline-profile "dev_linux" \
            --max-p95-latency-ms "100000" \
            --max-error-rate-pct "100" \
            --output "artifacts/agent-factory-plan-perf-gate-dev-linux-report.json"

      - name: Build baseline refresh drift report
        run: |
          python scripts/release/agent_factory_plan_perf_baseline_refresh.py \
            --baseline "eval/baselines/quality/agent_factory_plan_perf_envelope.json" \
            --report "release=artifacts/agent-factory-plan-perf-gate-release-report.json" \
            --report "nightly=artifacts/agent-factory-plan-perf-gate-nightly-report.json" \
            --report "dev_linux=artifacts/agent-factory-plan-perf-gate-dev-linux-report.json" \
            --output "artifacts/agent-factory-plan-perf-baseline-refresh-report.json" \
            --write-updated-baseline "artifacts/agent_factory_plan_perf_envelope_suggested.json"

      - name: Build baseline refresh PR template
        run: |
          python scripts/release/agent_factory_plan_perf_baseline_pr_template.py \
            --refresh-report "artifacts/agent-factory-plan-perf-baseline-refresh-report.json" \
            --suggested-baseline "artifacts/agent_factory_plan_perf_envelope_suggested.json" \
            --output "artifacts/agent-factory-plan-perf-baseline-pr-template.md" \
            --metadata-output "artifacts/agent-factory-plan-perf-baseline-pr-template-metadata.json"

      - name: Upload baseline refresh artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-factory-plan-perf-baseline-refresh
          path: |
            artifacts/agent-factory-plan-perf-gate-release-report.json
            artifacts/agent-factory-plan-perf-gate-nightly-report.json
            artifacts/agent-factory-plan-perf-gate-dev-linux-report.json
            artifacts/agent-factory-plan-perf-baseline-refresh-report.json
            artifacts/agent_factory_plan_perf_envelope_suggested.json
            artifacts/agent-factory-plan-perf-baseline-pr-template.md
            artifacts/agent-factory-plan-perf-baseline-pr-template-metadata.json
          if-no-files-found: error
