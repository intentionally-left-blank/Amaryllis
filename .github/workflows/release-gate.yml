name: Release Gate

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  compatibility-gate:
    name: API Compatibility Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Check toolchain manifest drift
        run: |
          python scripts/release/check_toolchain_drift.py

      - name: Check deterministic eval/replay fixture drift
        run: |
          python scripts/release/check_eval_replay_determinism.py

      - name: Install dependencies for contract checks
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Check dependency drift
        run: |
          python scripts/release/check_dependency_drift.py

      - name: Check runtime/SLO profile drift
        run: |
          python scripts/release/check_runtime_profile_drift.py

      - name: Check autonomy policy-pack contract
        run: |
          python scripts/release/check_autonomy_policy_pack.py

      - name: Generate release provenance + SBOM (blocking)
        env:
          AMARYLLIS_PROVENANCE_SIGNING_KEY: ${{ secrets.AMARYLLIS_PROVENANCE_SIGNING_KEY }}
          AMARYLLIS_PROVENANCE_KEY_ID: ${{ secrets.AMARYLLIS_PROVENANCE_KEY_ID }}
        run: |
          mkdir -p artifacts
          git archive --format=tar.gz HEAD -o artifacts/release-source.tar.gz

          SIGNING_MODE_ARGS=""
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            SIGNING_MODE_ARGS="--require-signing-key"
          fi

          python scripts/release/generate_release_provenance.py \
            --repo-root . \
            --artifact artifacts/release-source.tar.gz \
            --sbom-output artifacts/release-sbom.json \
            --provenance-output artifacts/release-provenance.json \
            --signature-output artifacts/release-provenance.sig \
            ${SIGNING_MODE_ARGS}

      - name: Check architectural import boundaries
        run: |
          python scripts/release/check_import_boundaries.py

      - name: Upload release provenance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-provenance
          path: |
            artifacts/release-source.tar.gz
            artifacts/release-sbom.json
            artifacts/release-provenance.json
            artifacts/release-provenance.sig
          if-no-files-found: error

      - name: Run API lifecycle and compatibility tests
        run: |
          python -m unittest \
            tests.test_api_lifecycle \
            tests.test_api_compatibility \
            -v

      - name: Run compatibility gate script (blocking)
        run: |
          python scripts/release/api_compat_gate.py

  canary-smoke:
    name: Canary Smoke Gate
    runs-on: ubuntu-latest
    needs: compatibility-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Install dependencies for smoke checks
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Run canary smoke checks (blocking)
        run: |
          python scripts/release/canary_smoke.py

      - name: Run performance smoke gate (blocking)
        run: |
          python scripts/release/perf_smoke_gate.py \
            --iterations "${AMARYLLIS_PERF_SMOKE_ITERATIONS:-3}" \
            --max-p95-latency-ms "${AMARYLLIS_PERF_SMOKE_MAX_P95_MS:-350}" \
            --max-error-rate-pct "${AMARYLLIS_PERF_SMOKE_MAX_ERROR_RATE_PCT:-0}"

      - name: Run fault-injection reliability gate (blocking)
        run: |
          python scripts/release/fault_injection_reliability_gate.py \
            --retry-max-attempts "${AMARYLLIS_FAULT_INJECTION_MAX_ATTEMPTS:-2}" \
            --scenario-timeout-sec "${AMARYLLIS_FAULT_INJECTION_TIMEOUT_SEC:-8}" \
            --min-pass-rate-pct "${AMARYLLIS_FAULT_INJECTION_MIN_PASS_RATE_PCT:-100}" \
            --output "artifacts/fault-injection-reliability-report.json"

      - name: Upload fault-injection reliability report
        uses: actions/upload-artifact@v4
        with:
          name: fault-injection-reliability-report
          path: artifacts/fault-injection-reliability-report.json
          if-no-files-found: error

      - name: Run mission queue concurrency/load gate (blocking)
        run: |
          python scripts/release/mission_queue_load_gate.py \
            --runs-total "${AMARYLLIS_QUEUE_LOAD_RUNS_TOTAL:-40}" \
            --submit-concurrency "${AMARYLLIS_QUEUE_LOAD_SUBMIT_CONCURRENCY:-8}" \
            --worker-count "${AMARYLLIS_QUEUE_LOAD_WORKER_COUNT:-4}" \
            --task-latency-ms "${AMARYLLIS_QUEUE_LOAD_TASK_LATENCY_MS:-35}" \
            --scenario-timeout-sec "${AMARYLLIS_QUEUE_LOAD_TIMEOUT_SEC:-30}" \
            --min-success-rate-pct "${AMARYLLIS_QUEUE_LOAD_MIN_SUCCESS_RATE_PCT:-99}" \
            --max-failed-runs "${AMARYLLIS_QUEUE_LOAD_MAX_FAILED_RUNS:-0}" \
            --max-p95-queue-wait-ms "${AMARYLLIS_QUEUE_LOAD_MAX_P95_QUEUE_WAIT_MS:-1500}" \
            --max-p95-end-to-end-ms "${AMARYLLIS_QUEUE_LOAD_MAX_P95_END_TO_END_MS:-5000}" \
            --output "artifacts/mission-queue-load-report.json"

      - name: Upload mission queue load report
        uses: actions/upload-artifact@v4
        with:
          name: mission-queue-load-report
          path: artifacts/mission-queue-load-report.json
          if-no-files-found: error

  linux-parity-gate:
    name: Linux Parity Gate
    runs-on: ubuntu-latest
    needs: canary-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Install dependencies for Linux parity checks
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Run Linux installer/channel contract tests
        run: |
          python -m unittest \
            tests.test_linux_installer_script \
            tests.test_linux_installer_smoke \
            tests.test_linux_channel_rollback \
            -v

      - name: Run Linux parity smoke checks (blocking)
        run: |
          python scripts/release/linux_parity_smoke.py \
            --iterations "${AMARYLLIS_LINUX_PARITY_ITERATIONS:-1}" \
            --require-linux \
            --output "artifacts/linux-parity-smoke-report.json"

      - name: Upload Linux parity smoke report
        uses: actions/upload-artifact@v4
        with:
          name: linux-parity-smoke-report
          path: artifacts/linux-parity-smoke-report.json
          if-no-files-found: error

      - name: Run Linux installer smoke checks (blocking)
        run: |
          python scripts/release/linux_installer_smoke.py \
            --require-linux \
            --output "artifacts/linux-installer-smoke-report.json"

      - name: Upload Linux installer smoke report
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer-smoke-report
          path: artifacts/linux-installer-smoke-report.json
          if-no-files-found: error

  disaster-recovery-gate:
    name: Disaster Recovery Gate
    runs-on: ubuntu-latest
    needs: linux-parity-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Install dependencies for DR checks
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Run disaster-recovery gate (backup + verify + restore drill)
        run: |
          python scripts/release/disaster_recovery_gate.py

  compliance-ops-gate:
    name: Compliance Operations Gate
    runs-on: ubuntu-latest
    needs: disaster-recovery-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Install dependencies for compliance checks
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Run compliance operations gate
        run: |
          python scripts/release/compliance_ops_gate.py
