name: Release Gate

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  compatibility-gate:
    name: API Compatibility Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Check toolchain manifest drift
        run: |
          python scripts/release/check_toolchain_drift.py

      - name: Check deterministic eval/replay fixture drift
        run: |
          python scripts/release/check_eval_replay_determinism.py

      - name: Install dependencies for contract checks
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Check dependency drift
        run: |
          python scripts/release/check_dependency_drift.py

      - name: Check runtime/SLO profile drift
        run: |
          python scripts/release/check_runtime_profile_drift.py

      - name: Check autonomy policy-pack contract
        run: |
          python scripts/release/check_autonomy_policy_pack.py

      - name: Generate release provenance + SBOM (blocking)
        env:
          AMARYLLIS_PROVENANCE_SIGNING_KEY: ${{ secrets.AMARYLLIS_PROVENANCE_SIGNING_KEY }}
          AMARYLLIS_PROVENANCE_KEY_ID: ${{ secrets.AMARYLLIS_PROVENANCE_KEY_ID }}
        run: |
          mkdir -p artifacts
          git archive --format=tar.gz HEAD -o artifacts/release-source.tar.gz

          SIGNING_MODE_ARGS=""
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            SIGNING_MODE_ARGS="--require-signing-key"
          fi

          python scripts/release/generate_release_provenance.py \
            --repo-root . \
            --artifact artifacts/release-source.tar.gz \
            --sbom-output artifacts/release-sbom.json \
            --provenance-output artifacts/release-provenance.json \
            --signature-output artifacts/release-provenance.sig \
            ${SIGNING_MODE_ARGS}

      - name: Check architectural import boundaries
        run: |
          python scripts/release/check_import_boundaries.py

      - name: Upload release provenance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-provenance
          path: |
            artifacts/release-source.tar.gz
            artifacts/release-sbom.json
            artifacts/release-provenance.json
            artifacts/release-provenance.sig
          if-no-files-found: error

      - name: Run API lifecycle and compatibility tests
        run: |
          python -m unittest \
            tests.test_api_lifecycle \
            tests.test_api_compatibility \
            -v

      - name: Run mission/runtime/plugin/quality contract tests
        run: |
          python -m unittest \
            tests.test_mission_policy \
            tests.test_mission_planner \
            tests.test_automation_mission_plan_api \
            tests.test_automation_scheduler \
            tests.test_agent_run_dispatch_mode_api \
            tests.test_desktop_action_adapter \
            tests.test_desktop_action_runtime_api \
            tests.test_macos_desktop_parity_smoke \
            tests.test_plugin_compat \
            tests.test_plugin_capabilities \
            tests.test_tool_plugin_signing \
            tests.test_tool_isolation_policy \
            tests.test_tool_call_parsing_security \
            tests.test_tool_sandbox \
            tests.test_injection_containment_gate \
            tests.test_model_artifact_admission \
            tests.test_model_artifact_admission_api \
            tests.test_model_artifact_admission_gate \
            tests.test_environment_passport_gate \
            tests.test_privacy_transparency_contract \
            tests.test_privacy_transparency_api \
            tests.test_offline_transparency_gate \
            tests.test_unified_session_manager \
            tests.test_flow_api \
            tests.test_supervisor_task_graph_manager \
            tests.test_supervisor_api \
            tests.test_release_quality_dashboard_snapshot \
            tests.test_publish_release_quality_snapshot \
            tests.test_publish_mission_success_recovery_snapshot \
            tests.test_mission_success_recovery_report_pack \
            tests.test_distribution_resilience_report \
            tests.test_distribution_channel_manifest_gate \
            tests.test_render_distribution_channel_manifests \
            tests.test_user_journey_benchmark \
            tests.test_runtime_service_manifest_renderer \
            tests.test_runtime_service_lifecycle \
            tests.test_runtime_lifecycle_smoke_gate \
            tests.test_qos_governor \
            tests.test_qos_governor_gate \
            tests.test_api_quickstart_compatibility_gate \
            tests.test_sdk_openai_compat_client \
            -v

      - name: Run compatibility gate script (blocking)
        run: |
          python scripts/release/api_compat_gate.py

      - name: Run API quickstart compatibility gate (blocking)
        run: |
          python scripts/release/api_quickstart_compatibility_gate.py \
            --output "artifacts/api-quickstart-compat-report.json"

      - name: Upload API quickstart compatibility report
        uses: actions/upload-artifact@v4
        with:
          name: api-quickstart-compat-report
          path: artifacts/api-quickstart-compat-report.json
          if-no-files-found: error

  canary-smoke:
    name: Canary Smoke Gate
    runs-on: ubuntu-latest
    needs: compatibility-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Install dependencies for smoke checks
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Run canary smoke checks (blocking)
        run: |
          python scripts/release/canary_smoke.py

      - name: Run performance smoke gate (blocking)
        run: |
          python scripts/release/perf_smoke_gate.py \
            --iterations "${AMARYLLIS_PERF_SMOKE_ITERATIONS:-3}" \
            --max-p95-latency-ms "${AMARYLLIS_PERF_SMOKE_MAX_P95_MS:-350}" \
            --max-error-rate-pct "${AMARYLLIS_PERF_SMOKE_MAX_ERROR_RATE_PCT:-0}" \
            --output "artifacts/perf-smoke-report.json"

      - name: Upload performance smoke report
        uses: actions/upload-artifact@v4
        with:
          name: perf-smoke-report
          path: artifacts/perf-smoke-report.json
          if-no-files-found: error

      - name: Run QoS governor gate (blocking)
        run: |
          python scripts/release/qos_governor_gate.py \
            --initial-mode "${AMARYLLIS_QOS_MODE:-balanced}" \
            --expect-critical-mode "${AMARYLLIS_QOS_GATE_EXPECT_CRITICAL_MODE:-power_save}" \
            --expect-final-mode "${AMARYLLIS_QOS_GATE_EXPECT_FINAL_MODE:-quality}" \
            --output "artifacts/qos-governor-gate-report.json"

      - name: Upload QoS governor gate report
        uses: actions/upload-artifact@v4
        with:
          name: qos-governor-gate-report
          path: artifacts/qos-governor-gate-report.json
          if-no-files-found: error

      - name: Run runtime lifecycle smoke + startup SLO gate (blocking)
        run: |
          python scripts/release/runtime_lifecycle_smoke_gate.py \
            --max-startup-slo-latency-ms "${AMARYLLIS_RUNTIME_LIFECYCLE_MAX_STARTUP_SLO_MS:-3000}" \
            --output "artifacts/runtime-lifecycle-smoke-report.json"

      - name: Upload runtime lifecycle smoke report
        uses: actions/upload-artifact@v4
        with:
          name: runtime-lifecycle-smoke-report
          path: artifacts/runtime-lifecycle-smoke-report.json
          if-no-files-found: error

      - name: Run fault-injection reliability gate (blocking)
        run: |
          python scripts/release/fault_injection_reliability_gate.py \
            --retry-max-attempts "${AMARYLLIS_FAULT_INJECTION_MAX_ATTEMPTS:-2}" \
            --scenario-timeout-sec "${AMARYLLIS_FAULT_INJECTION_TIMEOUT_SEC:-8}" \
            --min-pass-rate-pct "${AMARYLLIS_FAULT_INJECTION_MIN_PASS_RATE_PCT:-100}" \
            --output "artifacts/fault-injection-reliability-report.json"

      - name: Upload fault-injection reliability report
        uses: actions/upload-artifact@v4
        with:
          name: fault-injection-reliability-report
          path: artifacts/fault-injection-reliability-report.json
          if-no-files-found: error

      - name: Run injection containment gate (blocking)
        run: |
          python scripts/release/injection_containment_gate.py \
            --min-containment-score-pct "${AMARYLLIS_INJECTION_MIN_CONTAINMENT_PCT:-100}" \
            --max-failed-scenarios "${AMARYLLIS_INJECTION_MAX_FAILED_SCENARIOS:-0}" \
            --output "artifacts/injection-containment-report.json"

      - name: Upload injection containment report
        uses: actions/upload-artifact@v4
        with:
          name: injection-containment-report
          path: artifacts/injection-containment-report.json
          if-no-files-found: error

      - name: Run offline transparency gate (blocking)
        run: |
          python scripts/release/offline_transparency_gate.py \
            --min-local-providers "${AMARYLLIS_OFFLINE_GATE_MIN_LOCAL_PROVIDERS:-1}" \
            --output "artifacts/offline-transparency-report.json"

      - name: Upload offline transparency report
        uses: actions/upload-artifact@v4
        with:
          name: offline-transparency-report
          path: artifacts/offline-transparency-report.json
          if-no-files-found: error

      - name: Run model artifact admission gate (blocking)
        run: |
          python scripts/release/model_artifact_admission_gate.py \
            --min-admission-score-pct "${AMARYLLIS_MODEL_ADMISSION_MIN_SCORE_PCT:-100}" \
            --max-failed-scenarios "${AMARYLLIS_MODEL_ADMISSION_MAX_FAILED_SCENARIOS:-0}" \
            --output "artifacts/model-artifact-admission-report.json"

      - name: Upload model artifact admission report
        uses: actions/upload-artifact@v4
        with:
          name: model-artifact-admission-report
          path: artifacts/model-artifact-admission-report.json
          if-no-files-found: error

      - name: Run environment passport gate (blocking)
        run: |
          python scripts/release/environment_passport_gate.py \
            --model-artifact-admission-report "artifacts/model-artifact-admission-report.json" \
            --min-completeness-score-pct "${AMARYLLIS_ENV_PASSPORT_MIN_COMPLETENESS_PCT:-100}" \
            --max-missing-required "${AMARYLLIS_ENV_PASSPORT_MAX_MISSING_REQUIRED:-0}" \
            --output "artifacts/environment-passport-report.json"

      - name: Upload environment passport report
        uses: actions/upload-artifact@v4
        with:
          name: environment-passport-report
          path: artifacts/environment-passport-report.json
          if-no-files-found: error

      - name: Run mission queue concurrency/load gate (blocking)
        run: |
          python scripts/release/mission_queue_load_gate.py \
            --runs-total "${AMARYLLIS_QUEUE_LOAD_RUNS_TOTAL:-40}" \
            --submit-concurrency "${AMARYLLIS_QUEUE_LOAD_SUBMIT_CONCURRENCY:-8}" \
            --worker-count "${AMARYLLIS_QUEUE_LOAD_WORKER_COUNT:-4}" \
            --task-latency-ms "${AMARYLLIS_QUEUE_LOAD_TASK_LATENCY_MS:-35}" \
            --scenario-timeout-sec "${AMARYLLIS_QUEUE_LOAD_TIMEOUT_SEC:-30}" \
            --min-success-rate-pct "${AMARYLLIS_QUEUE_LOAD_MIN_SUCCESS_RATE_PCT:-99}" \
            --max-failed-runs "${AMARYLLIS_QUEUE_LOAD_MAX_FAILED_RUNS:-0}" \
            --max-p95-queue-wait-ms "${AMARYLLIS_QUEUE_LOAD_MAX_P95_QUEUE_WAIT_MS:-1500}" \
            --max-p95-end-to-end-ms "${AMARYLLIS_QUEUE_LOAD_MAX_P95_END_TO_END_MS:-5000}" \
            --output "artifacts/mission-queue-load-report.json"

      - name: Upload mission queue load report
        uses: actions/upload-artifact@v4
        with:
          name: mission-queue-load-report
          path: artifacts/mission-queue-load-report.json
          if-no-files-found: error

      - name: Run user journey benchmark gate (blocking)
        run: |
          python scripts/release/user_journey_benchmark.py \
            --iterations "${AMARYLLIS_USER_JOURNEY_ITERATIONS:-5}" \
            --min-success-rate-pct "${AMARYLLIS_USER_JOURNEY_MIN_SUCCESS_RATE_PCT:-100}" \
            --max-p95-journey-latency-ms "${AMARYLLIS_USER_JOURNEY_MAX_P95_MS:-3000}" \
            --max-p95-plan-dispatch-latency-ms "${AMARYLLIS_USER_JOURNEY_MAX_P95_PLAN_MS:-1200}" \
            --max-p95-execute-dispatch-latency-ms "${AMARYLLIS_USER_JOURNEY_MAX_P95_EXECUTE_MS:-1200}" \
            --min-plan-to-execute-conversion-rate-pct "${AMARYLLIS_USER_JOURNEY_MIN_CONVERSION_PCT:-100}" \
            --baseline "eval/baselines/quality/user_journey_benchmark_baseline.json" \
            --output "artifacts/user-journey-benchmark-report.json" \
            --strict

      - name: Upload user journey benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: user-journey-benchmark-report
          path: artifacts/user-journey-benchmark-report.json
          if-no-files-found: error

      - name: Download API quickstart compatibility report
        uses: actions/download-artifact@v4
        with:
          name: api-quickstart-compat-report
          path: artifacts/api-quickstart

      - name: Run macOS desktop parity smoke (staging, non-blocking)
        continue-on-error: true
        run: |
          python scripts/release/macos_desktop_parity_smoke.py \
            --iterations "${AMARYLLIS_MACOS_DESKTOP_PARITY_ITERATIONS:-2}" \
            --output "artifacts/macos-desktop-parity-smoke-report.json"

      - name: Upload macOS desktop parity smoke report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-desktop-parity-smoke-report
          path: artifacts/macos-desktop-parity-smoke-report.json
          if-no-files-found: warn

      - name: Build release quality dashboard snapshot (blocking)
        run: |
          RELEASE_CHANNEL="branch"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            RELEASE_CHANNEL="stable"
          fi
          MACOS_DESKTOP_PARITY_ARG=""
          if [[ -f "artifacts/macos-desktop-parity-smoke-report.json" ]]; then
            MACOS_DESKTOP_PARITY_ARG="--macos-desktop-parity-report artifacts/macos-desktop-parity-smoke-report.json"
          fi
          API_QUICKSTART_ARG=""
          if [[ -f "artifacts/api-quickstart/api-quickstart-compat-report.json" ]]; then
            API_QUICKSTART_ARG="--api-quickstart-report artifacts/api-quickstart/api-quickstart-compat-report.json"
          fi

          python scripts/release/build_quality_dashboard_snapshot.py \
            --perf-report "artifacts/perf-smoke-report.json" \
            --fault-injection-report "artifacts/fault-injection-reliability-report.json" \
            --injection-containment-report "artifacts/injection-containment-report.json" \
            --model-artifact-admission-report "artifacts/model-artifact-admission-report.json" \
            --environment-passport-report "artifacts/environment-passport-report.json" \
            --mission-queue-report "artifacts/mission-queue-load-report.json" \
            --runtime-lifecycle-report "artifacts/runtime-lifecycle-smoke-report.json" \
            --user-journey-report "artifacts/user-journey-benchmark-report.json" \
            --qos-governor-report "artifacts/qos-governor-gate-report.json" \
            ${API_QUICKSTART_ARG} \
            ${MACOS_DESKTOP_PARITY_ARG} \
            --baseline "eval/baselines/quality/release_quality_dashboard_baseline.json" \
            --output "artifacts/release-quality-dashboard.json" \
            --trend-output "artifacts/release-quality-dashboard-trend.json" \
            --release-id "${GITHUB_REF_NAME:-${GITHUB_SHA}}" \
            --release-channel "${RELEASE_CHANNEL}" \
            --commit-sha "${GITHUB_SHA}"

      - name: Upload release quality dashboard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-quality-dashboard
          path: |
            artifacts/release-quality-dashboard.json
            artifacts/release-quality-dashboard-trend.json
          if-no-files-found: error

  linux-parity-gate:
    name: Linux Parity Gate
    runs-on: ubuntu-latest
    needs: canary-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Install dependencies for Linux parity checks
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Download runtime lifecycle smoke report
        uses: actions/download-artifact@v4
        with:
          name: runtime-lifecycle-smoke-report
          path: artifacts/runtime-lifecycle

      - name: Run Linux installer/channel contract tests
        run: |
          python -m unittest \
            tests.test_linux_installer_script \
            tests.test_linux_installer_smoke \
            tests.test_linux_channel_rollback \
            -v

      - name: Run Linux parity smoke checks (blocking)
        run: |
          python scripts/release/linux_parity_smoke.py \
            --iterations "${AMARYLLIS_LINUX_PARITY_ITERATIONS:-1}" \
            --require-linux \
            --output "artifacts/linux-parity-smoke-report.json"

      - name: Upload Linux parity smoke report
        uses: actions/upload-artifact@v4
        with:
          name: linux-parity-smoke-report
          path: artifacts/linux-parity-smoke-report.json
          if-no-files-found: error

      - name: Run Linux installer smoke checks (blocking)
        run: |
          python scripts/release/linux_installer_smoke.py \
            --require-linux \
            --output "artifacts/linux-installer-smoke-report.json"

      - name: Upload Linux installer smoke report
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer-smoke-report
          path: artifacts/linux-installer-smoke-report.json
          if-no-files-found: error

      - name: Build distribution resilience report (blocking)
        run: |
          python scripts/release/build_distribution_resilience_report.py \
            --linux-parity-report "artifacts/linux-parity-smoke-report.json" \
            --linux-installer-report "artifacts/linux-installer-smoke-report.json" \
            --runtime-lifecycle-report "artifacts/runtime-lifecycle/runtime-lifecycle-smoke-report.json" \
            --output "artifacts/distribution-resilience-report.json"

      - name: Upload distribution resilience report
        uses: actions/upload-artifact@v4
        with:
          name: distribution-resilience-report
          path: artifacts/distribution-resilience-report.json
          if-no-files-found: error

      - name: Run distribution channel manifest readiness gate (blocking)
        run: |
          python scripts/release/distribution_channel_manifest_gate.py \
            --output "artifacts/distribution-channel-manifest-report.json"

      - name: Upload distribution channel manifest report
        uses: actions/upload-artifact@v4
        with:
          name: distribution-channel-manifest-report
          path: artifacts/distribution-channel-manifest-report.json
          if-no-files-found: error

  release-kpi-pack:
    name: Release KPI Pack
    runs-on: ubuntu-latest
    needs: linux-parity-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Download mission queue load report
        uses: actions/download-artifact@v4
        with:
          name: mission-queue-load-report
          path: artifacts/mission-queue

      - name: Download perf smoke report
        uses: actions/download-artifact@v4
        with:
          name: perf-smoke-report
          path: artifacts/perf

      - name: Download fault-injection reliability report
        uses: actions/download-artifact@v4
        with:
          name: fault-injection-reliability-report
          path: artifacts/fault-injection

      - name: Download injection containment report
        uses: actions/download-artifact@v4
        with:
          name: injection-containment-report
          path: artifacts/injection-containment

      - name: Download model artifact admission report
        uses: actions/download-artifact@v4
        with:
          name: model-artifact-admission-report
          path: artifacts/model-artifact-admission

      - name: Download environment passport report
        uses: actions/download-artifact@v4
        with:
          name: environment-passport-report
          path: artifacts/environment-passport

      - name: Download runtime lifecycle smoke report
        uses: actions/download-artifact@v4
        with:
          name: runtime-lifecycle-smoke-report
          path: artifacts/runtime-lifecycle

      - name: Download user journey benchmark report
        uses: actions/download-artifact@v4
        with:
          name: user-journey-benchmark-report
          path: artifacts/user-journey

      - name: Download distribution resilience report
        uses: actions/download-artifact@v4
        with:
          name: distribution-resilience-report
          path: artifacts/distribution

      - name: Download distribution channel manifest report
        uses: actions/download-artifact@v4
        with:
          name: distribution-channel-manifest-report
          path: artifacts/distribution-channel-manifest

      - name: Download API quickstart compatibility report
        uses: actions/download-artifact@v4
        with:
          name: api-quickstart-compat-report
          path: artifacts/api-quickstart

      - name: Download QoS governor gate report
        uses: actions/download-artifact@v4
        with:
          name: qos-governor-gate-report
          path: artifacts/qos-governor

      - name: Download macOS desktop parity smoke report (staging, optional)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: macos-desktop-parity-smoke-report
          path: artifacts/macos-desktop-parity

      - name: Build release quality dashboard snapshot (final, with distribution)
        run: |
          RELEASE_CHANNEL="branch"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            RELEASE_CHANNEL="stable"
          fi
          MACOS_DESKTOP_PARITY_ARG=""
          if [[ -f "artifacts/macos-desktop-parity/macos-desktop-parity-smoke-report.json" ]]; then
            MACOS_DESKTOP_PARITY_ARG="--macos-desktop-parity-report artifacts/macos-desktop-parity/macos-desktop-parity-smoke-report.json"
          fi

          python scripts/release/build_quality_dashboard_snapshot.py \
            --perf-report "artifacts/perf/perf-smoke-report.json" \
            --fault-injection-report "artifacts/fault-injection/fault-injection-reliability-report.json" \
            --injection-containment-report "artifacts/injection-containment/injection-containment-report.json" \
            --model-artifact-admission-report "artifacts/model-artifact-admission/model-artifact-admission-report.json" \
            --environment-passport-report "artifacts/environment-passport/environment-passport-report.json" \
            --mission-queue-report "artifacts/mission-queue/mission-queue-load-report.json" \
            --runtime-lifecycle-report "artifacts/runtime-lifecycle/runtime-lifecycle-smoke-report.json" \
            --user-journey-report "artifacts/user-journey/user-journey-benchmark-report.json" \
            --qos-governor-report "artifacts/qos-governor/qos-governor-gate-report.json" \
            --distribution-resilience-report "artifacts/distribution/distribution-resilience-report.json" \
            --api-quickstart-report "artifacts/api-quickstart/api-quickstart-compat-report.json" \
            ${MACOS_DESKTOP_PARITY_ARG} \
            --baseline "eval/baselines/quality/release_quality_dashboard_baseline.json" \
            --output "artifacts/release-quality-dashboard-final.json" \
            --trend-output "artifacts/release-quality-dashboard-trend-final.json" \
            --release-id "${GITHUB_REF_NAME:-${GITHUB_SHA}}" \
            --release-channel "${RELEASE_CHANNEL}" \
            --commit-sha "${GITHUB_SHA}"

      - name: Publish release quality snapshot for runtime export
        run: |
          python scripts/release/publish_release_quality_snapshot.py \
            --snapshot-report "artifacts/release-quality-dashboard-final.json" \
            --trend-report "artifacts/release-quality-dashboard-trend-final.json" \
            --output-snapshot "artifacts/release-quality-dashboard-runtime-export.json" \
            --output-trend "artifacts/release-quality-dashboard-trend-runtime-export.json"

      - name: Upload release quality dashboard artifacts (final)
        uses: actions/upload-artifact@v4
        with:
          name: release-quality-dashboard-final
          path: |
            artifacts/release-quality-dashboard-final.json
            artifacts/release-quality-dashboard-trend-final.json
            artifacts/release-quality-dashboard-runtime-export.json
            artifacts/release-quality-dashboard-trend-runtime-export.json
          if-no-files-found: error

      - name: Build mission success/recovery report pack (release)
        run: |
          MACOS_DESKTOP_PARITY_ARG=""
          if [[ -f "artifacts/macos-desktop-parity/macos-desktop-parity-smoke-report.json" ]]; then
            MACOS_DESKTOP_PARITY_ARG="--macos-desktop-parity-report artifacts/macos-desktop-parity/macos-desktop-parity-smoke-report.json"
          fi

          python scripts/release/build_mission_success_recovery_report.py \
            --mission-queue-report "artifacts/mission-queue/mission-queue-load-report.json" \
            --fault-injection-report "artifacts/fault-injection/fault-injection-reliability-report.json" \
            --quality-dashboard-report "artifacts/release-quality-dashboard-final.json" \
            --distribution-resilience-report "artifacts/distribution/distribution-resilience-report.json" \
            --user-journey-report "artifacts/user-journey/user-journey-benchmark-report.json" \
            ${MACOS_DESKTOP_PARITY_ARG} \
            --scope "release" \
            --output "artifacts/mission-success-recovery-report.json"

      - name: Upload mission success/recovery report pack
        uses: actions/upload-artifact@v4
        with:
          name: mission-success-recovery-report
          path: artifacts/mission-success-recovery-report.json
          if-no-files-found: error

  disaster-recovery-gate:
    name: Disaster Recovery Gate
    runs-on: ubuntu-latest
    needs: release-kpi-pack
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Install dependencies for DR checks
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Run disaster-recovery gate (backup + verify + restore drill)
        run: |
          python scripts/release/disaster_recovery_gate.py

  compliance-ops-gate:
    name: Compliance Operations Gate
    runs-on: ubuntu-latest
    needs: disaster-recovery-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Install dependencies for compliance checks
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Run compliance operations gate
        run: |
          python scripts/release/compliance_ops_gate.py
