name: Nightly Reliability

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

jobs:
  nightly-reliability:
    name: Extended Reliability Nightly
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Check toolchain manifest drift
        run: |
          python scripts/release/check_toolchain_drift.py

      - name: Check deterministic eval/replay fixture drift
        run: |
          python scripts/release/check_eval_replay_determinism.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Check dependency drift
        run: |
          python scripts/release/check_dependency_drift.py

      - name: Check runtime/SLO profile drift
        run: |
          python scripts/release/check_runtime_profile_drift.py

      - name: Check autonomy policy-pack contract
        run: |
          python scripts/release/check_autonomy_policy_pack.py

      - name: Check architectural import boundaries
        run: |
          python scripts/release/check_import_boundaries.py

      - name: Run nightly extended reliability suite (strict)
        run: |
          python scripts/release/nightly_reliability_run.py \
            --iterations "${AMARYLLIS_NIGHTLY_ITERATIONS:-12}" \
            --min-success-rate-pct "${AMARYLLIS_NIGHTLY_MIN_SUCCESS_RATE_PCT:-99}" \
            --max-p95-latency-ms "${AMARYLLIS_NIGHTLY_MAX_P95_MS:-600}" \
            --max-latency-jitter-ms "${AMARYLLIS_NIGHTLY_MAX_JITTER_MS:-120}" \
            --baseline "eval/baselines/reliability/nightly_smoke_baseline.json" \
            --output "artifacts/nightly-reliability-report.json" \
            --strict

      - name: Run nightly SLO burn-rate gate (blocking)
        run: |
          python scripts/release/nightly_slo_burn_rate_gate.py \
            --report "artifacts/nightly-reliability-report.json" \
            --max-consecutive-request-breach-samples "${AMARYLLIS_NIGHTLY_MAX_CONSECUTIVE_REQUEST_BURN_BREACHES:-2}" \
            --max-consecutive-run-breach-samples "${AMARYLLIS_NIGHTLY_MAX_CONSECUTIVE_RUN_BURN_BREACHES:-2}" \
            --output "artifacts/nightly-burn-rate-gate-report.json"

      - name: Run nightly user journey benchmark (strict)
        run: |
          python scripts/release/user_journey_benchmark.py \
            --iterations "${AMARYLLIS_NIGHTLY_USER_JOURNEY_ITERATIONS:-8}" \
            --min-success-rate-pct "${AMARYLLIS_NIGHTLY_USER_JOURNEY_MIN_SUCCESS_RATE_PCT:-100}" \
            --max-p95-journey-latency-ms "${AMARYLLIS_NIGHTLY_USER_JOURNEY_MAX_P95_MS:-3500}" \
            --max-p95-plan-dispatch-latency-ms "${AMARYLLIS_NIGHTLY_USER_JOURNEY_MAX_P95_PLAN_MS:-1500}" \
            --max-p95-execute-dispatch-latency-ms "${AMARYLLIS_NIGHTLY_USER_JOURNEY_MAX_P95_EXECUTE_MS:-1500}" \
            --min-plan-to-execute-conversion-rate-pct "${AMARYLLIS_NIGHTLY_USER_JOURNEY_MIN_CONVERSION_PCT:-100}" \
            --min-activation-success-rate-pct "${AMARYLLIS_NIGHTLY_USER_JOURNEY_MIN_ACTIVATION_SUCCESS_RATE_PCT:-100}" \
            --max-blocked-activation-rate-pct "${AMARYLLIS_NIGHTLY_USER_JOURNEY_MAX_BLOCKED_ACTIVATION_RATE_PCT:-0}" \
            --max-p95-activation-latency-ms "${AMARYLLIS_NIGHTLY_USER_JOURNEY_MAX_P95_ACTIVATION_MS:-600000}" \
            --min-install-success-rate-pct "${AMARYLLIS_NIGHTLY_USER_JOURNEY_MIN_INSTALL_SUCCESS_RATE_PCT:-100}" \
            --min-retention-proxy-success-rate-pct "${AMARYLLIS_NIGHTLY_USER_JOURNEY_MIN_RETENTION_PROXY_SUCCESS_RATE_PCT:-100}" \
            --min-feature-adoption-rate-pct "${AMARYLLIS_NIGHTLY_USER_JOURNEY_MIN_FEATURE_ADOPTION_RATE_PCT:-100}" \
            --baseline "eval/baselines/quality/user_journey_benchmark_baseline.json" \
            --output "artifacts/nightly-user-journey-benchmark-report.json" \
            --strict

      - name: Run nightly QoS governor gate (blocking)
        run: |
          python scripts/release/qos_governor_gate.py \
            --initial-mode "${AMARYLLIS_NIGHTLY_QOS_MODE:-balanced}" \
            --expect-critical-mode "${AMARYLLIS_NIGHTLY_QOS_EXPECT_CRITICAL_MODE:-power_save}" \
            --expect-final-mode "${AMARYLLIS_NIGHTLY_QOS_EXPECT_FINAL_MODE:-quality}" \
            --output "artifacts/nightly-qos-governor-gate-report.json"

      - name: Run nightly QoS mode envelope gate (blocking)
        run: |
          python scripts/release/qos_mode_envelope_gate.py \
            --journey-iterations "${AMARYLLIS_NIGHTLY_QOS_ENVELOPE_ITERATIONS:-2}" \
            --max-p95-journey-latency-ms "${AMARYLLIS_NIGHTLY_QOS_ENVELOPE_MAX_P95_JOURNEY_MS:-4000}" \
            --max-p95-plan-dispatch-latency-ms "${AMARYLLIS_NIGHTLY_QOS_ENVELOPE_MAX_P95_PLAN_MS:-1800}" \
            --max-p95-execute-dispatch-latency-ms "${AMARYLLIS_NIGHTLY_QOS_ENVELOPE_MAX_P95_EXECUTE_MS:-1800}" \
            --max-p95-activation-latency-ms "${AMARYLLIS_NIGHTLY_QOS_ENVELOPE_MAX_P95_ACTIVATION_MS:-600000}" \
            --max-failed-modes "${AMARYLLIS_NIGHTLY_QOS_ENVELOPE_MAX_FAILED_MODES:-0}" \
            --output "artifacts/nightly-qos-mode-envelope-gate-report.json"

      - name: Run nightly long-context reliability gate (blocking)
        run: |
          python scripts/release/long_context_reliability_gate.py \
            --dataset "eval/datasets/quality/long_context_reliability_cases.json" \
            --iterations "${AMARYLLIS_NIGHTLY_LONG_CONTEXT_ITERATIONS:-3}" \
            --min-run-success-rate-pct "${AMARYLLIS_NIGHTLY_LONG_CONTEXT_MIN_SUCCESS_RATE_PCT:-100}" \
            --min-relevance-score-pct "${AMARYLLIS_NIGHTLY_LONG_CONTEXT_MIN_RELEVANCE_PCT:-95}" \
            --min-stability-score-pct "${AMARYLLIS_NIGHTLY_LONG_CONTEXT_MIN_STABILITY_PCT:-100}" \
            --max-p95-latency-ms "${AMARYLLIS_NIGHTLY_LONG_CONTEXT_MAX_P95_MS:-4500}" \
            --baseline "eval/baselines/quality/long_context_reliability_baseline.json" \
            --max-relevance-regression-pct "${AMARYLLIS_NIGHTLY_LONG_CONTEXT_MAX_RELEVANCE_REGRESSION_PCT:-2}" \
            --max-stability-regression-pct "${AMARYLLIS_NIGHTLY_LONG_CONTEXT_MAX_STABILITY_REGRESSION_PCT:-1}" \
            --max-latency-regression-pct "${AMARYLLIS_NIGHTLY_LONG_CONTEXT_MAX_LATENCY_REGRESSION_PCT:-40}" \
            --output "artifacts/nightly-long-context-reliability-report.json"

      - name: Run nightly injection containment gate (blocking)
        run: |
          python scripts/release/injection_containment_gate.py \
            --min-containment-score-pct "${AMARYLLIS_NIGHTLY_INJECTION_MIN_CONTAINMENT_PCT:-100}" \
            --max-failed-scenarios "${AMARYLLIS_NIGHTLY_INJECTION_MAX_FAILED_SCENARIOS:-0}" \
            --require-scenario "rag_embedded_tool_call_is_ignored" \
            --require-scenario "pickle_deserialization_blocked" \
            --require-scenario "cloudpickle_deserialization_blocked" \
            --require-scenario "pandas_read_pickle_blocked" \
            --require-scenario "yaml_python_tag_blocked" \
            --output "artifacts/nightly-injection-containment-report.json"

      - name: Run nightly personalization adapter gate (blocking)
        run: |
          python scripts/release/personalization_adapter_gate.py \
            --min-registered-adapters "${AMARYLLIS_NIGHTLY_PERSONALIZATION_GATE_MIN_REGISTERED:-2}" \
            --output "artifacts/nightly-personalization-adapter-gate-report.json"

      - name: Run nightly offline transparency gate (blocking)
        run: |
          python scripts/release/offline_transparency_gate.py \
            --min-local-providers "${AMARYLLIS_NIGHTLY_OFFLINE_GATE_MIN_LOCAL_PROVIDERS:-1}" \
            --output "artifacts/nightly-offline-transparency-report.json"

      - name: Run nightly model artifact admission gate (blocking)
        run: |
          python scripts/release/model_artifact_admission_gate.py \
            --min-admission-score-pct "${AMARYLLIS_NIGHTLY_MODEL_ADMISSION_MIN_SCORE_PCT:-100}" \
            --max-failed-scenarios "${AMARYLLIS_NIGHTLY_MODEL_ADMISSION_MAX_FAILED_SCENARIOS:-0}" \
            --require-scenario "valid_manifest_admitted" \
            --require-scenario "missing_quant_recipe_rejected" \
            --require-scenario "denied_license_rejected" \
            --output "artifacts/nightly-model-artifact-admission-report.json"

      - name: Run nightly license admission gate (blocking)
        run: |
          python scripts/release/license_admission_gate.py \
            --min-admission-score-pct "${AMARYLLIS_NIGHTLY_LICENSE_ADMISSION_MIN_SCORE_PCT:-100}" \
            --max-failed-scenarios "${AMARYLLIS_NIGHTLY_LICENSE_ADMISSION_MAX_FAILED_SCENARIOS:-0}" \
            --require-scenario "allowed_license_admitted" \
            --require-scenario "denied_spdx_rejected" \
            --require-scenario "noncommercial_rejected" \
            --output "artifacts/nightly-license-admission-report.json"

      - name: Run nightly environment passport gate (blocking)
        run: |
          python scripts/release/environment_passport_gate.py \
            --model-artifact-admission-report "artifacts/nightly-model-artifact-admission-report.json" \
            --min-completeness-score-pct "${AMARYLLIS_NIGHTLY_ENV_PASSPORT_MIN_COMPLETENESS_PCT:-100}" \
            --max-missing-required "${AMARYLLIS_NIGHTLY_ENV_PASSPORT_MAX_MISSING_REQUIRED:-0}" \
            --output "artifacts/nightly-environment-passport-report.json"

      - name: Run nightly distribution channel manifest gate (blocking)
        run: |
          python scripts/release/distribution_channel_manifest_gate.py \
            --output "artifacts/nightly-distribution-channel-manifest-report.json"

      - name: Render nightly distribution channel manifests (blocking)
        run: |
          RELEASE_REF="nightly-${GITHUB_SHA}"
          RELEASE_VERSION="0.0.0-nightly-${GITHUB_SHA::7}"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_REF}"
          WINDOWS_SHA="$(printf "%s" "${GITHUB_SHA}-nightly-windows-x64" | sha256sum | awk '{print $1}')"
          MACOS_ARM64_SHA="$(printf "%s" "${GITHUB_SHA}-nightly-macos-arm64" | sha256sum | awk '{print $1}')"
          MACOS_X64_SHA="$(printf "%s" "${GITHUB_SHA}-nightly-macos-x64" | sha256sum | awk '{print $1}')"
          FLATHUB_SHA="$(printf "%s" "${GITHUB_SHA}-nightly-flathub-archive" | sha256sum | awk '{print $1}')"

          python scripts/release/render_distribution_channel_manifests.py \
            --version "${RELEASE_VERSION}" \
            --windows-x64-url "${BASE_URL}/amaryllis-windows-x64.zip" \
            --windows-x64-sha256 "${WINDOWS_SHA}" \
            --macos-arm64-url "${BASE_URL}/amaryllis-macos-arm64.tar.gz" \
            --macos-arm64-sha256 "${MACOS_ARM64_SHA}" \
            --macos-x64-url "${BASE_URL}/amaryllis-macos-x64.tar.gz" \
            --macos-x64-sha256 "${MACOS_X64_SHA}" \
            --flathub-archive-url "${BASE_URL}/amaryllis-flathub.tar.gz" \
            --flathub-archive-sha256 "${FLATHUB_SHA}" \
            --output-dir "artifacts/nightly-distribution-channels-rendered" \
            --report "artifacts/nightly-distribution-channels-rendered-report.json"

      - name: Run nightly distribution channel render gate (blocking)
        run: |
          python scripts/release/distribution_channel_render_gate.py \
            --render-report "artifacts/nightly-distribution-channels-rendered-report.json" \
            --expected-version "0.0.0-nightly-${GITHUB_SHA::7}" \
            --output "artifacts/nightly-distribution-channel-render-gate-report.json"

      - name: Run nightly API quickstart compatibility gate (blocking)
        run: |
          python scripts/release/api_quickstart_compatibility_gate.py \
            --output "artifacts/nightly-api-quickstart-compat-report.json"

      - name: Run nightly Agent Factory intent gate (blocking)
        run: |
          python scripts/release/agent_factory_intent_gate.py \
            --output "artifacts/nightly-agent-factory-intent-gate-report.json"

      - name: Run nightly Agent Factory quickstart flow gate (blocking)
        run: |
          python scripts/release/agent_factory_quickstart_flow_gate.py \
            --output "artifacts/nightly-agent-factory-quickstart-flow-gate-report.json"

      - name: Run nightly Agent template contract gate (blocking)
        run: |
          python scripts/release/agent_template_contract_gate.py \
            --output "artifacts/nightly-agent-template-contract-gate-report.json"

      - name: Run nightly provider entitlement diagnostics gate (blocking)
        run: |
          python scripts/release/provider_entitlement_diagnostics_gate.py \
            --output "artifacts/nightly-provider-entitlement-diagnostics-gate-report.json"

      - name: Run nightly competitive benchmark dataset gate (blocking)
        run: |
          python scripts/release/competitive_benchmark_dataset_gate.py \
            --output "artifacts/nightly-competitive-benchmark-dataset-report.json"

      - name: Run nightly Agent Factory plan perf gate (blocking)
        run: |
          python scripts/release/agent_factory_plan_perf_gate.py \
            --baseline "eval/baselines/quality/agent_factory_plan_perf_envelope.json" \
            --baseline-profile "${AMARYLLIS_NIGHTLY_AGENT_FACTORY_PLAN_PERF_PROFILE:-nightly}" \
            --output "artifacts/nightly-agent-factory-plan-perf-gate-report.json"

      - name: Run nightly first-run activation gate (blocking)
        run: |
          python scripts/release/first_run_activation_gate.py \
            --output "artifacts/nightly-first-run-activation-gate-report.json"

      - name: Run nightly localization/governance gate (blocking)
        run: |
          python scripts/release/localization_governance_gate.py \
            --output "artifacts/nightly-localization-governance-gate-report.json"

      - name: Run nightly flow/interaction gate (blocking)
        run: |
          python scripts/release/flow_interaction_gate.py \
            --output "artifacts/nightly-flow-interaction-gate-report.json"

      - name: Run nightly action explainability gate (blocking)
        run: |
          python scripts/release/action_explainability_gate.py \
            --output "artifacts/nightly-action-explainability-gate-report.json"

      - name: Run nightly autonomy circuit breaker gate (blocking)
        run: |
          python scripts/release/autonomy_circuit_breaker_gate.py \
            --output "artifacts/nightly-autonomy-circuit-breaker-gate-report.json"

      - name: Run nightly autonomy circuit breaker stability soak gate (blocking)
        run: |
          python scripts/release/autonomy_circuit_breaker_soak_gate.py \
            --cycles "${AMARYLLIS_NIGHTLY_BREAKER_SOAK_CYCLES:-9}" \
            --min-success-rate-pct "${AMARYLLIS_NIGHTLY_BREAKER_SOAK_MIN_SUCCESS_RATE_PCT:-100}" \
            --max-failed-cycles "${AMARYLLIS_NIGHTLY_BREAKER_SOAK_MAX_FAILED_CYCLES:-0}" \
            --max-p95-cycle-latency-ms "${AMARYLLIS_NIGHTLY_BREAKER_SOAK_MAX_P95_CYCLE_MS:-4500}" \
            --output "artifacts/nightly-autonomy-circuit-breaker-soak-gate-report.json"

      - name: Run nightly desktop action rollback gate (blocking)
        run: |
          python scripts/release/desktop_action_rollback_gate.py \
            --output "artifacts/nightly-desktop-action-rollback-gate-report.json"

      - name: Run nightly supervisor mission gate (blocking)
        run: |
          python scripts/release/supervisor_mission_gate.py \
            --output "artifacts/nightly-supervisor-mission-gate-report.json"

      - name: Run nightly generation-loop conformance gate (blocking)
        run: |
          python scripts/release/generation_loop_conformance_gate.py \
            --min-providers "${AMARYLLIS_NIGHTLY_GENLOOP_MIN_PROVIDERS:-1}" \
            --max-warning-providers "${AMARYLLIS_NIGHTLY_GENLOOP_MAX_WARNING_PROVIDERS:-1000000}" \
            --output "artifacts/nightly-generation-loop-conformance-gate-report.json"

      - name: Run nightly provenance coverage gate (blocking)
        run: |
          python scripts/release/provenance_coverage_gate.py \
            --min-grounded-sources "${AMARYLLIS_NIGHTLY_PROVENANCE_GATE_MIN_GROUNDED_SOURCES:-1}" \
            --output "artifacts/nightly-provenance-coverage-gate-report.json"

      - name: Run nightly news mission gate (blocking)
        run: |
          python scripts/release/news_mission_gate.py \
            --min-citation-coverage "${AMARYLLIS_NEWS_GATE_MIN_CITATION_COVERAGE:-0.95}" \
            --min-sections "${AMARYLLIS_NEWS_GATE_MIN_SECTIONS:-1}" \
            --output "artifacts/nightly-news-mission-gate-report.json"

      - name: Run nightly KV pressure policy gate (blocking)
        run: |
          python scripts/release/kv_pressure_policy_gate.py \
            --min-pressure-events "${AMARYLLIS_NIGHTLY_KV_PRESSURE_GATE_MIN_EVENTS:-1}" \
            --min-critical-events "${AMARYLLIS_NIGHTLY_KV_PRESSURE_GATE_MIN_CRITICAL_EVENTS:-1}" \
            --output "artifacts/nightly-kv-pressure-policy-gate-report.json"

      - name: Run nightly adoption KPI schema gate (blocking)
        run: |
          python scripts/release/adoption_kpi_schema_gate.py \
            --user-journey-report "artifacts/nightly-user-journey-benchmark-report.json" \
            --api-quickstart-report "artifacts/nightly-api-quickstart-compat-report.json" \
            --distribution-channel-manifest-report "artifacts/nightly-distribution-channel-manifest-report.json" \
            --output "artifacts/nightly-adoption-kpi-schema-gate-report.json"

      - name: Build nightly adoption KPI snapshot (blocking)
        run: |
          python scripts/release/build_adoption_kpi_snapshot.py \
            --schema-gate-report "artifacts/nightly-adoption-kpi-schema-gate-report.json" \
            --user-journey-report "artifacts/nightly-user-journey-benchmark-report.json" \
            --api-quickstart-report "artifacts/nightly-api-quickstart-compat-report.json" \
            --distribution-channel-manifest-report "artifacts/nightly-distribution-channel-manifest-report.json" \
            --output "artifacts/nightly-adoption-kpi-snapshot-report.json" \
            --release-id "nightly-${GITHUB_SHA}" \
            --release-channel "nightly" \
            --commit-sha "${GITHUB_SHA}"

      - name: Run nightly adoption KPI trend gate (blocking)
        run: |
          python scripts/release/adoption_kpi_trend_gate.py \
            --snapshot-report "artifacts/nightly-adoption-kpi-snapshot-report.json" \
            --baseline "eval/baselines/quality/adoption_kpi_snapshot_baseline.json" \
            --max-activation-success-regression-pct "${AMARYLLIS_NIGHTLY_ADOPTION_MAX_ACTIVATION_SUCCESS_REGRESSION_PCT:-1}" \
            --max-activation-blocked-rate-increase-pct "${AMARYLLIS_NIGHTLY_ADOPTION_MAX_ACTIVATION_BLOCKED_RATE_INCREASE_PCT:-0}" \
            --max-install-success-regression-pct "${AMARYLLIS_NIGHTLY_ADOPTION_MAX_INSTALL_SUCCESS_REGRESSION_PCT:-1}" \
            --max-retention-proxy-regression-pct "${AMARYLLIS_NIGHTLY_ADOPTION_MAX_RETENTION_PROXY_REGRESSION_PCT:-1}" \
            --max-feature-adoption-regression-pct "${AMARYLLIS_NIGHTLY_ADOPTION_MAX_FEATURE_ADOPTION_REGRESSION_PCT:-2}" \
            --max-api-quickstart-pass-rate-regression-pct "${AMARYLLIS_NIGHTLY_ADOPTION_MAX_API_QUICKSTART_PASS_RATE_REGRESSION_PCT:-1}" \
            --max-channel-coverage-regression-pct "${AMARYLLIS_NIGHTLY_ADOPTION_MAX_CHANNEL_COVERAGE_REGRESSION_PCT:-1}" \
            --output "artifacts/nightly-adoption-kpi-trend-gate-report.json"

      - name: Publish nightly adoption KPI snapshot for runtime export
        run: |
          python scripts/release/publish_adoption_kpi_snapshot.py \
            --snapshot-report "artifacts/nightly-adoption-kpi-snapshot-report.json" \
            --channel "nightly" \
            --expect-release-channel "nightly" \
            --output "artifacts/nightly-adoption-kpi-snapshot-runtime-export.json"

      - name: Run macOS desktop parity smoke (staging, non-blocking)
        continue-on-error: true
        run: |
          python scripts/release/macos_desktop_parity_smoke.py \
            --iterations "${AMARYLLIS_NIGHTLY_MACOS_DESKTOP_PARITY_ITERATIONS:-2}" \
            --output "artifacts/nightly-macos-desktop-parity-smoke-report.json"

      - name: Build mission success/recovery report pack (nightly)
        if: ${{ always() }}
        run: |
          MACOS_DESKTOP_PARITY_ARG=""
          if [[ -f "artifacts/nightly-macos-desktop-parity-smoke-report.json" ]]; then
            MACOS_DESKTOP_PARITY_ARG="--macos-desktop-parity-report artifacts/nightly-macos-desktop-parity-smoke-report.json"
          fi

          python scripts/release/build_mission_success_recovery_report.py \
            --nightly-reliability-report "artifacts/nightly-reliability-report.json" \
            --nightly-burn-rate-report "artifacts/nightly-burn-rate-gate-report.json" \
            --user-journey-report "artifacts/nightly-user-journey-benchmark-report.json" \
            --adoption-kpi-trend-report "artifacts/nightly-adoption-kpi-trend-gate-report.json" \
            --breaker-gate-report "artifacts/nightly-autonomy-circuit-breaker-gate-report.json" \
            --breaker-soak-report "artifacts/nightly-autonomy-circuit-breaker-soak-gate-report.json" \
            --news-mission-report "artifacts/nightly-news-mission-gate-report.json" \
            ${MACOS_DESKTOP_PARITY_ARG} \
            --scope "nightly" \
            --output "artifacts/nightly-mission-success-recovery-report.json"

      - name: Run nightly mission report pack gate (blocking)
        if: ${{ always() }}
        run: |
          python scripts/release/mission_report_pack_gate.py \
            --report "artifacts/nightly-mission-success-recovery-report.json" \
            --expected-scope "nightly" \
            --output "artifacts/nightly-mission-report-pack-gate-report.json"

      - name: Publish nightly mission report for runtime export
        if: ${{ always() }}
        run: |
          if [[ -f "artifacts/nightly-mission-success-recovery-report.json" ]]; then
            python scripts/release/publish_mission_success_recovery_snapshot.py \
              --report "artifacts/nightly-mission-success-recovery-report.json" \
              --channel "nightly" \
              --expect-scope "nightly" \
              --output "artifacts/nightly-mission-success-recovery-runtime-export.json"
          else
            echo "[nightly-runtime-export] source report missing; skip publish"
          fi

      - name: Upload nightly reliability report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: nightly-reliability-report
          path: artifacts/nightly-reliability-report.json
          if-no-files-found: error

      - name: Upload nightly burn-rate gate report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: nightly-burn-rate-gate-report
          path: artifacts/nightly-burn-rate-gate-report.json
          if-no-files-found: error

      - name: Upload nightly user journey benchmark report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: nightly-user-journey-benchmark-report
          path: artifacts/nightly-user-journey-benchmark-report.json
          if-no-files-found: error

      - name: Upload nightly QoS governor gate report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: nightly-qos-governor-gate-report
          path: artifacts/nightly-qos-governor-gate-report.json
          if-no-files-found: error

      - name: Upload nightly QoS mode envelope gate report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: nightly-qos-mode-envelope-gate-report
          path: artifacts/nightly-qos-mode-envelope-gate-report.json
          if-no-files-found: error

      - name: Upload nightly long-context reliability report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: nightly-long-context-reliability-report
          path: artifacts/nightly-long-context-reliability-report.json
          if-no-files-found: error

      - name: Upload nightly injection containment report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: nightly-injection-containment-report
